<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- ファビコン(Subutomo 共通アセット。サイトキットで配布) -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/favicon-180.png">
  <title>&lt;記入: サイト名&gt;</title>
  <style>
    body { margin: 0; font-family: sans-serif; }

    /* ══════════════════════════════════════════════════════════════
       統一フッター (Subutomo Dev 共通フォーマット)
       ・支援3リンク(チップ/Sponsors/ご意見ご要望)= 画面「右下」に固定
       ・言語トグル(JP/EN)= 画面「右上」に固定
       ・© と版(vX.Y.Z)= 左下バッジが担う(badge.js)。ここに © は置かない。
       ・背景は透過。色はテーマトークン(var(--…))を参照し、未定義サイト用に
         フォールバック値を持つ ＝ サイトのテーマカラーがそのまま適用される
       他サイトへはこの <style> の .su-foot* 群 + 下の 2要素(.su-foot-links /
       .su-foot-lang)+ <script> をコピーする。
       ═══════════════════════════════════════════════════════════════ */
    /* 支援3リンク: 右下固定クラスタ */
    .su-foot-links {
      position: fixed; right: 16px; bottom: 14px; z-index: 9000;
      display: flex; flex-wrap: wrap; align-items: center; justify-content: flex-end;
      gap: 6px 12px; max-width: 80vw;
      font: 11px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      letter-spacing: .03em;
    }
    .su-foot-support { display: flex; align-items: center; gap: 6px; }
    .su-foot-support a { color: var(--text-muted, rgba(0, 0, 0, 0.55)); text-decoration: none; white-space: nowrap; }
    .su-foot-support a:hover { color: var(--accent, #5a7290); text-decoration: underline; }
    .su-foot-sep { color: var(--text-muted, rgba(0, 0, 0, 0.4)); opacity: .6; }
    /* ご意見・ご要望(一回り大きめ＆太字・~12秒周期で一瞬ポップ) */
    .su-foot-feedback {
      font-weight: 700; font-size: 13px;
      color: var(--accent, #5a7290); text-decoration: none; white-space: nowrap;
      transform-origin: center; animation: su-foot-pop 12s ease-in-out infinite;
    }
    .su-foot-feedback:hover { text-decoration: underline; }
    @keyframes su-foot-pop {
      0%, 86%   { opacity: 1;   transform: scale(1); }
      89%       { opacity: .15; transform: scale(.92); }
      93%       { opacity: 1;   transform: scale(1.06); }
      97%, 100% { opacity: 1;   transform: scale(1); }
    }
    @media (prefers-reduced-motion: reduce) { .su-foot-feedback { animation: none; } }
    /* 言語トグル: 右上固定 */
    .su-foot-lang {
      position: fixed; top: 14px; right: 16px; z-index: 9000;
      background: none; border: 1px solid var(--border, rgba(0, 0, 0, 0.2)); border-radius: 999px;
      padding: 3px 10px;
      font: 11px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      letter-spacing: .03em; color: var(--text-muted, rgba(0, 0, 0, 0.55)); cursor: pointer;
      transition: color .15s ease, border-color .15s ease;
    }
    .su-foot-lang:hover { color: var(--accent, #5a7290); border-color: var(--accent, #5a7290); }
  </style>
</head>
<body>
  <!-- ── ここからサイト本体を実装する ──────────────────────────── -->
  <main>
    <h1>&lt;記入: サイト名&gt;</h1>
  </main>

  <!-- ══ 統一フッター: 支援3リンク=右下 / 言語トグル=右上(他サイトへはこの2要素 + 下の <script> をコピー)══ -->
  <nav class="su-foot-links" aria-label="支援リンク">
    <span class="su-foot-support">
      <a href="https://ko-fi.com/subutomo" target="_blank" rel="noopener noreferrer"><span aria-hidden="true">☕ </span><span data-i18n="tip">チップ</span></a>
      <span class="su-foot-sep" aria-hidden="true">・</span>
      <a href="https://github.com/sponsors/t-sumita" target="_blank" rel="noopener noreferrer"><span aria-hidden="true">❤️ </span>Sponsors</a>
    </span>
    <a class="su-foot-feedback" href="https://docs.google.com/forms/d/e/1FAIpQLSe8-WYLGkSj7hkO0aQH9Cy6rNDd4a12sSLfPtlnxTTJUEJl6w/viewform" target="_blank" rel="noopener noreferrer"><span aria-hidden="true">📣 </span><span data-i18n="feedback">ご意見・ご要望</span></a>
  </nav>
  <button type="button" class="su-foot-lang" data-foot-langtoggle aria-label="Switch language">EN</button>

  <script>
    (function () {
      'use strict';
      var langBtn = document.querySelector('[data-foot-langtoggle]');
      var i18nNodes = document.querySelectorAll('[data-i18n]');
      if (!langBtn && !i18nNodes.length) return;

      // toggle = ボタンに出す「切替先」表示。日本語は "JP" 表記。
      var I18N = {
        ja: { tip: 'チップ', feedback: 'ご意見・ご要望', toggle: 'EN' },
        en: { tip: 'Tip',   feedback: 'Feedback',     toggle: 'JP' }
      };
      var curLang = 'ja';

      // <html lang> で判定。"en*" のみ英語、他は日本語
      function detectLang() {
        var l = (document.documentElement.lang || 'ja').toLowerCase();
        return l.indexOf('en') === 0 ? 'en' : 'ja';
      }

      function applyLang(lang) {
        var dict = I18N[lang] || I18N.ja;
        for (var i = 0; i < i18nNodes.length; i++) {
          var k = i18nNodes[i].getAttribute('data-i18n');
          if (dict[k] != null) i18nNodes[i].textContent = dict[k];
        }
        if (langBtn) langBtn.textContent = dict.toggle;
        curLang = lang;
        document.documentElement.lang = lang;   // バッジ(MutationObserver)も追従
      }

      window.setFooterLang = applyLang;

      if (langBtn) langBtn.addEventListener('click', function () {
        applyLang(curLang === 'ja' ? 'en' : 'ja');
      });

      applyLang(detectLang());
    }());
  </script>

  <!-- 版の単一ソース(config.js の APP_VERSION)。左下バッジの © の右へ注入 -->
  <script type="module">
    import { APP_VERSION } from './config.js';
    window.SUBUTOMO_FOOTER_VERSION = APP_VERSION;
    if (window.__suBadgeApplyVersion) window.__suBadgeApplyVersion();
  </script>

  <!-- Subutomo バッジ(currentSiteId と theme を記入すれば動く) -->
  <script>
    window.SUBUTOMO_BADGE_CONFIG = {
      currentSiteId: '<記入: 新プロジェクト名>',
      sitesJsonPath: 'config/subutomo-sites.json',   // ローカル参照(同期スキルで複製)
      logoPath: './common/assets/logo.png',
      theme: 'light-bg',   // 明るい背景: 'light-bg' / 暗い背景: 'dark-bg'
      onSecretAction: null
    };
  </script>
  <script src="./assets/subutomo-badge.js"></script>
</body>
</html>
