<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- ファビコン(Subutomo 共通アセット。サイトキットで配布) -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/favicon-180.png">
  <title>&lt;記入: サイト名&gt;</title>
  <style>
    body { margin: 0; font-family: sans-serif; }

    /* ══════════════════════════════════════════════════════════════
       統一フッター (Subutomo Dev 共通フォーマット / subu-mnym と同形)
       ・支援リンク(チップ/Sponsors/ご意見ご要望)+ 日英トグルのみ。
         © と版(vX.Y.Z)は左下バッジが担う(badge.js)。フッターに © は置かない。
       ・背景は透過。色はテーマトークン(var(--…))を参照し、未定義サイト用に
         フォールバック値を持つ ＝ サイトのテーマカラーがそのまま適用される
       ・日英切替(右端トグル / window.setFooterLang('ja'|'en') / <html lang>)
       他サイトへはこの <style> 内の .su-foot 群 + 下の <footer> + <script>
       2本を丸ごとコピーする。
       ═══════════════════════════════════════════════════════════════ */
    .su-foot {
      --su-foot-muted: var(--text-muted, rgba(0, 0, 0, 0.55));
      --su-foot-accent: var(--accent, #5a7290);
      --su-foot-border: var(--border, rgba(0, 0, 0, 0.08));
      background: transparent;            /* 透過 ＝ サイトのテーマ背景が透ける */
      font: 11px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      letter-spacing: .03em;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px 16px;
      padding: 14px 20px 16px;
      margin-top: 48px;
      border-top: 1px solid var(--su-foot-border);
    }
    .su-foot-right { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
    /* 支援リンク(小さめ控えめ) */
    .su-foot-support { display: flex; align-items: center; gap: 6px; }
    .su-foot-support a { color: var(--su-foot-muted); text-decoration: none; white-space: nowrap; }
    .su-foot-support a:hover { color: var(--su-foot-accent); text-decoration: underline; }
    .su-foot-sep { color: var(--su-foot-muted); opacity: .6; }
    /* ご意見・ご要望(一回り大きめ＆太字・~12秒周期で一瞬ポップ) */
    .su-foot-feedback {
      font-weight: 700; font-size: 13px;
      color: var(--su-foot-accent); text-decoration: none; white-space: nowrap;
      transform-origin: center; animation: su-foot-pop 12s ease-in-out infinite;
    }
    .su-foot-feedback:hover { text-decoration: underline; }
    @keyframes su-foot-pop {
      0%, 86%   { opacity: 1;   transform: scale(1); }
      89%       { opacity: .15; transform: scale(.92); }
      93%       { opacity: 1;   transform: scale(1.06); }
      97%, 100% { opacity: 1;   transform: scale(1); }
    }
    @media (prefers-reduced-motion: reduce) { .su-foot-feedback { animation: none; } }
    /* 言語切替トグル */
    .su-foot-lang {
      background: none; border: 1px solid var(--su-foot-border); border-radius: 999px;
      padding: 3px 10px; font: inherit; color: var(--su-foot-muted); cursor: pointer;
      transition: color .15s ease, border-color .15s ease;
    }
    .su-foot-lang:hover { color: var(--su-foot-accent); border-color: var(--su-foot-accent); }
    @media (max-width: 480px) {
      .su-foot { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <!-- ── ここからサイト本体を実装する ──────────────────────────── -->
  <main>
    <h1>&lt;記入: サイト名&gt;</h1>
  </main>

  <!-- ══ 統一フッター(他サイトへはこの <footer> と下の <script> 2本をコピー)══ -->
  <footer class="su-foot" data-lang="ja">
    <div class="su-foot-right">
      <span class="su-foot-support">
        <a href="https://ko-fi.com/subutomo" target="_blank" rel="noopener noreferrer"><span aria-hidden="true">☕ </span><span data-i18n="tip">チップ</span></a>
        <span class="su-foot-sep" aria-hidden="true">・</span>
        <a href="https://github.com/sponsors/t-sumita" target="_blank" rel="noopener noreferrer"><span aria-hidden="true">❤️ </span>Sponsors</a>
      </span>
      <a class="su-foot-feedback" href="https://docs.google.com/forms/d/e/1FAIpQLSe8-WYLGkSj7hkO0aQH9Cy6rNDd4a12sSLfPtlnxTTJUEJl6w/viewform" target="_blank" rel="noopener noreferrer"><span aria-hidden="true">📣 </span><span data-i18n="feedback">ご意見・ご要望</span></a>
      <button type="button" class="su-foot-lang" data-foot-langtoggle aria-label="Switch language">EN</button>
    </div>
  </footer>

  <script>
    (function () {
      'use strict';
      var foot = document.querySelector('.su-foot');
      if (!foot) return;

      // 言語辞書(日本語 / 英語)
      var I18N = {
        ja: { tip: 'チップ', feedback: 'ご意見・ご要望', toggle: 'EN' },
        en: { tip: 'Tip',   feedback: 'Feedback',     toggle: '日本語' }
      };

      // footer[data-lang] → <html lang> の順で判定。"en*" のみ英語、他は日本語
      function detectLang() {
        var l = (foot.getAttribute('data-lang') ||
                 document.documentElement.lang || 'ja').toLowerCase();
        return l.indexOf('en') === 0 ? 'en' : 'ja';
      }

      function applyLang(lang) {
        var dict = I18N[lang] || I18N.ja;
        var nodes = foot.querySelectorAll('[data-i18n]');
        for (var i = 0; i < nodes.length; i++) {
          var k = nodes[i].getAttribute('data-i18n');
          if (dict[k] != null) nodes[i].textContent = dict[k];
        }
        var b = foot.querySelector('[data-foot-langtoggle]');
        if (b) b.textContent = dict.toggle;
        foot.setAttribute('data-lang', lang);
        document.documentElement.lang = lang;
      }

      window.setFooterLang = applyLang;

      var toggle = foot.querySelector('[data-foot-langtoggle]');
      if (toggle) toggle.addEventListener('click', function () {
        applyLang((foot.getAttribute('data-lang') || 'ja') === 'ja' ? 'en' : 'ja');
      });

      applyLang(detectLang());
    }());
  </script>

  <!-- 版の単一ソース(config.js の APP_VERSION)。左下バッジの © の右へ注入 -->
  <script type="module">
    import { APP_VERSION } from './config.js';
    window.SUBUTOMO_FOOTER_VERSION = APP_VERSION;
    if (window.__suBadgeApplyVersion) window.__suBadgeApplyVersion();
  </script>

  <!-- Subutomo バッジ(currentSiteId と theme を記入すれば動く) -->
  <script>
    window.SUBUTOMO_BADGE_CONFIG = {
      currentSiteId: '<記入: 新プロジェクト名>',
      sitesJsonPath: 'config/subutomo-sites.json',   // ローカル参照(同期スキルで複製)
      logoPath: './common/assets/logo.png',
      theme: 'light-bg',   // 明るい背景: 'light-bg' / 暗い背景: 'dark-bg'
      onSecretAction: null
    };
  </script>
  <script src="./assets/subutomo-badge.js"></script>
</body>
</html>
